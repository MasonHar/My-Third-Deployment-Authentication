<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions 3 API — Browser Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    section { margin: 1.25rem 0; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; }
    label { display: block; margin: 0.5rem 0 0.2rem; font-weight: 600; }
    input, textarea, button { font: inherit; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 0.4rem; }
    button { margin-top: 0.5rem; margin-right: 0.5rem; padding: 0.4rem 0.8rem; cursor: pointer; }
    pre { background: #f4f4f4; padding: 0.75rem; overflow: auto; font-size: 0.85rem; }
    .ok { color: #0a0; }
    .err { color: #c00; }
    #token { word-break: break-all; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Transactions 3 API — Browser Demo</h1>
  <p>API base: <code id="base"></code> · <a href="/">GET / (JSON)</a></p>

  <section>
    <h2>1. Register</h2>
    <label>Username</label>
    <input id="regUser" value="maria" />
    <label>Password (needs a number)</label>
    <input id="regPass" value="hello123" />
    <button type="button" id="btnRegister">Register</button>
  </section>

  <section>
    <h2>2. Login (admin: secret321)</h2>
    <label>Username</label>
    <input id="loginUser" value="admin" />
    <label>Password</label>
    <input id="loginPass" value="secret321" />
    <button type="button" id="btnLogin">Login</button>
    <p>Token: <span id="token">(none)</span></p>
  </section>

  <section>
    <h2>3. GET /api/auth/me</h2>
    <button type="button" id="btnMe">Get me</button>
  </section>

  <section>
    <h2>4. Create transaction</h2>
    <label>JSON body</label>
    <textarea id="txBody" rows="6">{
  "creditCardNickname": "Costco Visa",
  "cardType": "Visa",
  "date": "2026-05-17",
  "amount": 42.75,
  "amendment": false,
  "comment": "Gas"
}</textarea>
    <button type="button" id="btnCreateTx">POST transaction</button>
    <button type="button" id="btnListTx">GET all transactions</button>
  </section>

  <section>
    <h2>Response</h2>
    <pre id="out">Run an action above.</pre>
  </section>

  <script>
    const base = location.origin;
    document.getElementById("base").textContent = base;
    let token = localStorage.getItem("tx3_token") || "";
    const out = document.getElementById("out");
    const tokenEl = document.getElementById("token");

    function showToken() {
      tokenEl.textContent = token ? token.slice(0, 40) + "…" : "(none)";
    }
    showToken();

    async function api(method, path, body) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = "Bearer " + token;
      const opts = { method, headers };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const res = await fetch(base + path, opts);
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      out.textContent = res.status + " " + res.statusText + "\n\n" + JSON.stringify(data, null, 2);
      out.className = res.ok ? "ok" : "err";
      return { res, data };
    }

    document.getElementById("btnRegister").onclick = async () => {
      const { data } = await api("POST", "/api/auth/register", {
        username: document.getElementById("regUser").value,
        password: document.getElementById("regPass").value
      });
      if (data.token) { token = data.token; localStorage.setItem("tx3_token", token); showToken(); }
    };

    document.getElementById("btnLogin").onclick = async () => {
      const { data } = await api("POST", "/api/auth/login", {
        username: document.getElementById("loginUser").value,
        password: document.getElementById("loginPass").value
      });
      if (data.token) { token = data.token; localStorage.setItem("tx3_token", token); showToken(); }
    };

    document.getElementById("btnMe").onclick = () => api("GET", "/api/auth/me");
    document.getElementById("btnCreateTx").onclick = () =>
      api("POST", "/api/transactions", JSON.parse(document.getElementById("txBody").value));
    document.getElementById("btnListTx").onclick = () => api("GET", "/api/transactions");
  </script>
</body>
</html>
